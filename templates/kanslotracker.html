<head>
    <meta charset="UTF-8">
    <title>Känslotracker</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

    <link rel="icon" type="image/png"
    href="{{ url_for('static', filename='favicon.png') }}">
    <a href="/" class="back-link">← Tillbaka till hubben</a>
</head>

<body>
  <h1>Känslo-tracker 💛</h1>

  <div class="card">
    <label for="feelingSelect">Hur känner du dig just nu?</label>
    <select id="feelingSelect">
      <option value="">– Välj grundkänsla –</option>
      <option value="ilska">Ilska</option>
      <option value="rädsla">Rädsla</option>
      <option value="avsky">Avsky</option>
      <option value="skam">Skam</option>
      <option value="sorg">Sorg</option>
      <option value="glädje">Glädje</option>
    </select>

    <label for="nuanceSelect">Vilken nyans känner du?</label>
    <select id="nuanceSelect">
      <option value="">– Välj nyans –</option>
    </select>

    <button class="primary" id="showTipBtn">Visa tips</button>
    <button class="secondary" id="saveBtn">Spara i historik</button>

    <p id="tipText"></p>

    <label for="noteInput">Vill du skriva något mer om hur det känns?</label>
    <textarea id="noteInput" rows="3" placeholder="Fri text... (valfritt)"></textarea>
  </div>

  <div class="card">
    <h2>Din historik</h2>
    <div id="historyList"></div>
  </div>

    // ------------------------
    // DOM-element
    // ------------------------
    document.addEventListener("DOMContentLoaded", () => {
    const feelingSelect = document.getElementById("feelingSelect");
    const showTipBtn = document.getElementById("showTipBtn");
    const saveBtn = document.getElementById("saveBtn");
    const tipText = document.getElementById("tipText");
    const noteInput = document.getElementById("noteInput");
    const historyList = document.getElementById("historyList");
    const nuanceSelect = document.getElementById("nuanceSelect");

  console.log("feelingSelect:", feelingSelect);
  console.log("nuanceSelect:", nuanceSelect);
    // ------------------------
    // Nyanser per grundkänsla
    // ------------------------
   const nuances = {
  ilska: ["irriterad","frustrerad","kränkt","avundsjuk","ursinnig","bitter"],
  rädsla: ["oro","nervös","skräckslagen","överväldigad","värdelös","hotad","skrämd"],
  avsky: ["motvilja","äcklad","förakt","ogillande","avsmak","tveksam","förfärad"],
  skam: ["misslyckad","skuld","generad","ånger","dåligt samvete","blyg","undvikande"],
  sorg: ["sårbar","ensam","maktlös","skör","olycklig","bedrövad","nedstämd"],
  glädje: ["optimistisk","lycklig","stolt","kärleksfull","hoppfull","inspirerad","euforisk"]
};
    // När man väljer grundkänsla – uppdatera nyanser
 function resetNuanceSelect() {
    nuanceSelect.innerHTML = '<option value="">– Välj nyans –</option>';
    nuanceSelect.value = "";
    nuanceSelect.disabled = true;
  }

  resetNuanceSelect();

  feelingSelect.addEventListener("change", () => {
    const value = feelingSelect.value;
    console.log("Vald grundkänsla:", value);

    resetNuanceSelect();
    if (!value || !nuances[value]) return;

    nuances[value].forEach((nuance) => {
      const option = document.createElement("option");
      option.value = nuance;
      option.textContent = nuance.charAt(0).toUpperCase() + nuance.slice(1);
      nuanceSelect.appendChild(option);
    });

    nuanceSelect.disabled = false;
  });
});

    // ------------------------
    // Historik-funktioner
    // ------------------------
    function loadHistory() {
      const raw = localStorage.getItem("kansloTrackerHistory");
      if (!raw) return [];
      try {
        return JSON.parse(raw);
      } catch (e) {
        console.error("Kunde inte läsa historik:", e);
        return [];
      }
    }

    function saveHistory(history) {
      localStorage.setItem("kansloTrackerHistory", JSON.stringify(history));
    }

    function renderHistory() {
      const history = loadHistory();
      historyList.innerHTML = "";

      if (history.length === 0) {
        historyList.textContent = "Ingen historik ännu. Börja med att spara en känsla.";
        return;
      }

      history.forEach(entry => {
        const div = document.createElement("div");
        div.className = "history-item";

        const dateText = new Date(entry.timestamp).toLocaleString("sv-SE");
        div.innerHTML = `
          <strong>${entry.feeling}${entry.nuance ? " – " + entry.nuance : ""}</strong>
          <small>${dateText}</small>
          ${entry.tip ? `<div>${entry.tip.replace(/\n/g, "<br>")}</div>` : ""}
          ${entry.note ? `<div><em>${entry.note}</em></div>` : ""}
        `;
        historyList.appendChild(div);
      });
    }

    // ------------------------
    // Visa tips
    // ------------------------
    showTipBtn.addEventListener("click", () => {
      const feeling = feelingSelect.value;
      const nuance = nuanceSelect.value;

      if (!feeling) {
        tipText.textContent = "Välj en grundkänsla först.";
        return;
      }

      let tips = [];

      // Först: försök hitta tips för nyans
      if (
        nuance &&
        tipsPerNuance[feeling] &&
        tipsPerNuance[feeling][nuance] &&
        tipsPerNuance[feeling][nuance].length > 0
      ) {
        tips = tipsPerNuance[feeling][nuance];
      } else {
        // annars: fall tillbaka till grundkänslan
        tips = tipsPerFeeling[feeling] || [];
      }

      if (!tips || tips.length === 0) {
        tipText.textContent = "Inga tips hittades för den här känslan ännu.";
        return;
      }

      // Välj upp till 3 unika slumpade tips
      const maxCount = Math.min(3, tips.length);
      const usedIndices = new Set();
      const selectedTips = [];

      while (selectedTips.length < maxCount) {
        const randomIndex = Math.floor(Math.random() * tips.length);
        if (!usedIndices.has(randomIndex)) {
          usedIndices.add(randomIndex);
          selectedTips.push(tips[randomIndex]);
        }
      }

      tipText.textContent = selectedTips.map(t => "• " + t).join("\n\n");
    });

    // ------------------------
    // Spara i historik
    // ------------------------
    saveBtn.addEventListener("click", () => {
      const feeling = feelingSelect.value;
      if (!feeling) {
        alert("Välj en grundkänsla innan du sparar.");
        return;
      }

      const history = loadHistory();
      const entry = {
        feeling,
        nuance: nuanceSelect.value || "",
        tip: tipText.textContent || "",
        note: noteInput.value.trim(),
        timestamp: Date.now()
      };
      history.unshift(entry);
      saveHistory(history);
      renderHistory();

      noteInput.value = "";
    });

    // Init
    renderHistory();
  </script>
